<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex Quest - Pre-Survey Questionnaire</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanlines"></div>

  <main class="panel">
    <div class="status-row">
      <div class="status-pill">PRE-SIMULATION QUESTIONNAIRE</div>
      <div class="status-pill">10 QUESTIONS</div>
    </div>

    <h1>PRE-SURVEY</h1>
    <p class="tagline">COMPLETE THIS BEFORE ENTERING THE SIMULATION</p>

    <form class="questionnaire-form" action="save_presurvey.php" method="POST">
      
      <div class="question-block">
        <label for="age">1. What is your age group?</label>
        <select id="age" name="age" required>
          <option value="">Select an option</option>
          <option>Under 18</option>
          <option>18-24</option>
          <option>25-34</option>
          <option>35-44</option>
          <option>45-54</option>
          <option>55-64</option>
          <option>65+</option>
          <option>Prefer not to say</option>
        </select>
      </div>

      <div class="question-block">
        <label for="gender">2. What is your gender?</label>
        <select id="gender" name="gender" required>
          <option value="">Select an option</option>
          <option>Female</option>
          <option>Male</option>
          <option>Non-binary</option>
          <option>Prefer not to say</option>
        </select>
      </div>

      <div class="question-block">
        <label for="education">3. What is your highest level of education?</label>
        <select id="education" name="education" required>
          <option value="">Select an option</option>
          <option>Secondary school or equivalent</option>
          <option>College / Sixth Form</option>
          <option>Undergraduate degree</option>
          <option>Postgraduate degree</option>
          <option>Other</option>
          <option>Prefer not to say</option>
        </select>
      </div>

      <div class="question-block">
        <label for="training">4. Have you previously received any cyber-security training, education, or guidance?</label>
        <select id="training" name="training" required>
          <option value="">Select an option</option>
          <option>Yes, formal training</option>
          <option>Yes, informal guidance</option>
          <option>No</option>
          <option>Unsure</option>
        </select>
      </div>

      <div class="question-block">
        <label for="usage">5. How often do you use email, messaging apps, and online accounts in everyday life?</label>
        <select id="usage" name="usage" required>
          <option value="">Select an option</option>
          <option>Rarely</option>
          <option>A few times a week</option>
          <option>Once a day</option>
          <option>Several times a day</option>
          <option>Almost constantly</option>
        </select>
      </div>

      <div class="question-block">
        <label for="identify">6. How confident are you in identifying phishing attempts or suspicious digital messages?</label>
        <select id="identify" name="identify" required>
          <option value="">Select an option</option>
          <option>Not confident at all</option>
          <option>Slightly confident</option>
          <option>Moderately confident</option>
          <option>Very confident</option>
          <option>Extremely confident</option>
        </select>
      </div>

      <div class="question-block">
        <label for="qual1">7. In your own words, what usually makes a digital message or request seem suspicious to you?</label>
        <textarea id="qual1" name="qual1" placeholder="Type your response here..." required></textarea>
      </div>

      <div class="question-block">
        <label for="qual2">8. In your own words, why do you think people make unsafe decisions online?</label>
        <textarea id="qual2" name="qual2" placeholder="Type your response here..." required></textarea>
      </div>

      <div class="question-block">
        <label for="qual3">9. In your own words, what factors would make you trust a message, alert, or online request?</label>
        <textarea id="qual3" name="qual3" placeholder="Type your response here..." required></textarea>
      </div>

      <div class="question-block">
        <label for="qual4">10. In your own words, how do you usually decide whether to respond to or ignore a digital message?</label>
        <textarea id="qual4" name="qual4" placeholder="Type your response here..." required></textarea>
      </div>

      <div class="button-row">
        <button type="button" class="start-btn" onclick="window.location.href='consent.html'">BACK</button>
        <button type="submit" class="start-btn">CONTINUE</button>
      </div>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
