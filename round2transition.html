<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex Quest - Round 2 Transition</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanlines"></div>

  <main class="panel">
    <div class="game-topbar">
      <div class="status-pill">ROUND 1 COMPLETE</div>
      <div class="status-pill">THREAT LEVEL: INCREASED</div>
      <div class="status-pill">SCORE: <span id="scoreDisplay">0</span></div>
    </div>

    <h1>ROUND 2</h1>
    <p class="tagline">THREAT LEVEL: ELEVATED</p>

    <div class="briefing-box">
  


      <p>
        Maintain control. Review before reacting.
      </p>
    </div>

    <div class="button-row">
      <button class="start-btn" onclick="window.location.href='round1scenario2.html'">BACK</button>
      <button class="start-btn" onclick="window.location.href='round2scenario1.html'">BEGIN ROUND 2</button>
    </div>
  </main>

  <script>
    window.onload = function () {
      const savedScore = sessionStorage.getItem("cq_score");
      document.getElementById("scoreDisplay").textContent = savedScore !== null ? savedScore : 0;
    };
  </script>
</body>
</html>
