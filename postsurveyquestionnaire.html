<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex Quest - Post-Survey</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <div class="scanlines"></div>

  <main class="panel">
    <div class="status-row">
      <div class="status-pill">POST-SIMULATION QUESTIONNAIRE</div>
      <div class="status-pill">10 QUESTIONS</div>
    </div>

    <h1>POST-SURVEY</h1>
    <p class="tagline">COMPLETE THIS AFTER THE SIMULATION</p>

    <form class="questionnaire-form" action="save_postsurvey.php" method="POST">
      <div class="question-block">
        <label for="difficulty">1. How difficult did you find the simulation overall?</label>
        <select id="difficulty" name="difficulty" required>
          <option value="">Select an option</option>
          <option>Very easy</option>
          <option>Easy</option>
          <option>Moderately difficult</option>
          <option>Difficult</option>
          <option>Very difficult</option>
        </select>
      </div>

      <div class="question-block">
        <label for="pressure">2. How much pressure did you feel while making decisions during the simulation?</label>
        <select id="pressure" name="pressure" required>
          <option value="">Select an option</option>
          <option>No pressure at all</option>
          <option>Slight pressure</option>
          <option>Moderate pressure</option>
          <option>High pressure</option>
          <option>Very high pressure</option>
        </select>
      </div>

      <div class="question-block">
        <label for="realism">3. How realistic did the scenarios feel in relation to real digital messages, alerts, or online requests?</label>
        <select id="realism" name="realism" required>
          <option value="">Select an option</option>
          <option>Not realistic at all</option>
          <option>Slightly realistic</option>
          <option>Moderately realistic</option>
          <option>Very realistic</option>
          <option>Extremely realistic</option>
        </select>
      </div>

      <div class="question-block">
        <label for="engagement">4. How engaging did you find the simulation overall?</label>
        <select id="engagement" name="engagement" required>
          <option value="">Select an option</option>
          <option>Not engaging at all</option>
          <option>Slightly engaging</option>
          <option>Moderately engaging</option>
          <option>Very engaging</option>
          <option>Extremely engaging</option>
        </select>
      </div>

      <div class="question-block">
        <label for="confidence_after">5. After completing the simulation, how confident are you in identifying phishing attempts or suspicious digital messages?</label>
        <select id="confidence_after" name="confidence_after" required>
          <option value="">Select an option</option>
          <option>Not confident at all</option>
          <option>Slightly confident</option>
          <option>Moderately confident</option>
          <option>Very confident</option>
          <option>Extremely confident</option>
        </select>
      </div>

      <div class="question-block">
        <label for="decision_pressure">6. After completing the simulation, how confident are you in making accurate cyber-security decisions under time pressure?</label>
        <select id="decision_pressure" name="decision_pressure" required>
          <option value="">Select an option</option>
          <option>Not confident at all</option>
          <option>Slightly confident</option>
          <option>Moderately confident</option>
          <option>Very confident</option>
          <option>Extremely confident</option>
        </select>
      </div>

      <div class="question-block">
        <label for="urgency_influence">7. To what extent did urgency or time pressure influence your decisions during the simulation?</label>
        <select id="urgency_influence" name="urgency_influence" required>
          <option value="">Select an option</option>
          <option>Not at all</option>
          <option>Slightly</option>
          <option>Moderately</option>
          <option>Strongly</option>
          <option>Very strongly</option>
        </select>
      </div>

      <div class="question-block">
        <label for="qual_post1">8. In your own words, which cues most influenced your decisions during the simulation, for example urgency, authority, reward, or consequence-based wording?</label>
        <textarea class="matrix-textarea" id="qual_post1" name="qual_post1" placeholder="Type your response here..." required></textarea>
      </div>

      <div class="question-block">
        <label for="qual_post2">9. In your own words, which scenario or decision did you find most difficult, and why?</label>
        <textarea class="matrix-textarea" id="qual_post2" name="qual_post2" placeholder="Type your response here..." required></textarea>
      </div>

      <div class="question-block">
        <label for="qual_post3">10. In your own words, has this simulation changed how you will respond to digital messages or requests in future? Please explain.</label>
        <textarea class="matrix-textarea" id="qual_post3" name="qual_post3" placeholder="Type your response here..." required></textarea>
      </div>

      <div class="button-row">
        <button type="button" class="start-btn" onclick="window.location.href='results.html'">BACK</button>
        <button type="submit" class="start-btn">SUBMIT POST-SURVEY</button>
      </div>
    </form>
  </main>
</body>
</html>
